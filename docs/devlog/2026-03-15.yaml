- date: 2026-03-15
  area: infrastructure
  title: Auth redirect diagnosis (Supabase email templates)
  status: blocked
  files: []
  changes:
    - Diagnosed magic link and password reset emails redirecting to root instead of /profile
    - Root cause is Supabase email templates using {{ .ConfirmationURL }} which doesn't include redirect_to parameter
  decisions:
    - Fix requires manual Supabase Dashboard change — email templates must use decomposed URL format with {{ .SiteURL }}/auth/v1/verify?token={{ .TokenHash }}&type=...&redirect_to={{ .RedirectURL }}
    - This is a configuration issue, not a code bug — useAuth.ts already sets emailRedirectTo correctly
  next: Update Confirm signup and Magic Link templates in Supabase Dashboard to use decomposed URL with {{ .RedirectURL }}
