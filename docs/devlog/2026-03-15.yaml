- date: 2026-03-15
  area: chat
  title: Chat bug fixes, mobile responsive, PR #13 merge
  status: done
  files:
    - src/components/ui/Chat.module.scss
    - src/components/ui/ChatPage.tsx
    - src/components/ui/ChatRoom.tsx
    - src/components/ui/MessageList.tsx
    - src/components/ui/MessageInput.tsx
    - src/components/layout/ChatShell.module.scss
  changes:
    - Fixed chat rendering off-screen — removed double offset (margin-top + padding-top) in .chatLayout
    - Fixed chat still not scrolling — added box-sizing border-box to ChatShell .mainPane (100vh + padding overflowed)
    - Added id/name/autoComplete attributes to all form fields (chat input, emote picker filter, gif search, sidebar search)
    - Mobile responsive sidebar — collapses to floating burger toggle at ≤700px, drawer slides in with backdrop
    - Moved profile/logout controls into mobile sidebar drawer to avoid overlapping chat input
    - Day separator timestamps between message groups from different days
    - Unread marker — localStorage-based lastRead tracking per room, visual divider before first unread message
    - Scroll-to-bottom FAB appears when scrolled up from bottom
    - Keyboard shortcuts — / to focus input, Escape to clear reply or blur
    - Merged PR #13 (auth redirect + infinite scroll) with fixes for race condition and scroll restoration
  decisions:
    - Used loadingMoreRef (synchronous ref) instead of React state to guard infinite scroll — state batching allowed duplicate fetches before the flag updated
    - Replaced requestAnimationFrame scroll restore with useLayoutEffect — runs synchronously before paint, eliminating position jump
    - Mobile sidebar uses transform slide-in rather than display toggle for smooth animation
    - Unread tracking uses localStorage keyed by room ID — simple, no server round-trip, sufficient for side-panel use case
  next: Link previews in chat messages, update docs/chat.md with completed items

